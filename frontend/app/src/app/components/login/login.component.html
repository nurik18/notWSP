<div class="login-container">
  <div class="login-card">
    <h2>Вход в систему</h2>

    <!-- Сообщение об ошибке -->
    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <!-- Форма с ngModel -->
    <div class="form-group">
      <label>Логин</label>
      <!-- ngModel control №1 -->
      <input
        type="text"
        [(ngModel)]="username"
        placeholder="Введите логин"
        class="form-input"
      />
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <!-- ngModel control №2 -->
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Введите пароль"
        class="form-input"
      />
    </div>

    <!-- Click event: Login -->
    <button class="btn btn-primary" (click)="onLogin()" [disabled]="isLoading">
      {{ isLoading ? 'Вход...' : 'Войти' }}
    </button>
  </div>
</div>
